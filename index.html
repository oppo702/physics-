          {

            </table>`

                <p><strong>x<sub>i</sub>:</strong> الموقع الابتدائي (m)</p>
              </div>
              <div class="bg-indigo-900/50 p-4 rounded-lg border border-indigo-500/30">
                <p class="font-bold text-amber-300 mb-2">مثال:</p>
                <p>تحرك جسم من الموقع 2m إلى 8m، أوجد الإزاحة.</p>
                <p class="formula-box text-xl text-center my-2">Δx = 8 - 2 = 6 m</p>
              </div>
            </div>`
          },
          {
            heading: "السرعة المتوسطة (v̄)",

              <div class="bg-sky-900/40 p-5 rounded-xl border border-sky-500/30 text-center">

              <div class="bg-slate-700 p-4 rounded-lg">

              <div class="bg-indigo-900/50 p-4 rounded-lg border border-indigo-500/30">

                <p>قطع جسم إزاحة 100m في زمن 20s، أوجد السرعة المتوسطة.</p>
                <p class="formula-box text-xl text-center my-2">v̄ = 100 / 20 = 5 m/s</p>
              </div>
            </div>`
          },

            </div>`
          }
        ]

                <p>زادت سرعة سيارة من 10 m/s إلى 30 m/s في 5s.</p>

            </div>`

          {

                <p class="formula-box text-2xl text-center text-sky-200">Δx = v<sub>i</sub>·t + ½·a·t²</p>

                <p class="font-bold text-sky-300 mb-3">المعادلة الثالثة:</p>
                <p class="formula-box text-2xl text-center text-sky-200">v<sub>f</sub>² = v<sub>i</sub>² + 2·a·Δx</p>
              </div>
              <div class="bg-indigo-900/50 p-4 rounded-lg border border-indigo-500/30">
                <p class="font-bold text-amber-300 mb-2">مثال: سيارة تبدأ من السكون بتسارع 3 m/s²، أوجد سرعتها بعد 4s.</p>
                <p class="formula-box text-xl text-center my-2">v<sub>f</sub> = 0 + 3×4 = 12 m/s</p>
              </div>
              <div class="bg-indigo-900/50 p-4 rounded-lg border border-indigo-500/30">
                <p class="font-bold text-amber-300 mb-2">مثال: أوجد المسافة التي قطعتها نفس السيارة.</p>
                <p class="formula-box text-xl text-center my-2">Δx = 0×4 + ½×3×16 = 24 m</p>
              </div>
            </div>`
          },
          {
            heading: "السقوط الحر",
            content: `<div class="space-y-4">
              <div class="bg-slate-700 p-4 rounded-lg">

                <p class="formula-box text-xl text-center text-sky-200 mt-2">v<sub>f</sub>² = v<sub>i</sub>² + 2·g·Δy</p>
              </div>
            </div>`

        ]
      },
      4: {

        sections: [
          {

          },

            heading: "الوزن (قوة الجاذبية)",
            content: `<div class="space-y-4">
              <div class="bg-sky-900/40 p-5 rounded-xl border border-sky-500/30 text-center">
                <p class="formula-box text-2xl text-sky-200">W = m · g</p>

                <p class="formula-box text-xl text-center my-2">W = 10 × 9.8 = 98 N</p>
              </div>
            </div>`
          },
          {
            heading: "قوة الاحتكاك",
            content: `<div class="space-y-4">

      },
      5: {

        sections: [
          {
